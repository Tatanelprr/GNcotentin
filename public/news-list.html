<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toutes les actualités – Géocacheurs Normands du Cotentin</title>
    <meta name="description" content="Retrouvez toutes les actualités de l'association des Géocacheurs Normands du Cotentin : événements, sorties, animations et nouvelles du territoire.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://gncotentin.web.app/news-list.html">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gncotentin.web.app/news-list.html">
    <meta property="og:title" content="Actualités – Géocacheurs Normands du Cotentin">
    <meta property="og:description" content="Toutes les actualités de l'association des Géocacheurs Normands du Cotentin.">
    <meta property="og:image" content="https://gncotentin.web.app/assets/img/ui/GNLogo.jpg">
    <meta property="og:locale" content="fr_FR">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        #news-list-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 10vh;
        }
        .news-card {
            display: flex;
            gap: 20px;
            align-items: center;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(97,0,0,0.2);
        }
        .news-card-img {
            width: 160px;
            height: 120px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: #ddd;
        }
        .news-card-body {
            padding: 15px 15px 15px 0;
            flex: 1;
        }
        .news-card-title {
            font-family: Impact, sans-serif;
            font-size: 22px;
            color: var(--primary-color);
            margin: 0 0 8px 0;
            text-align: left;
        }
        .news-card-resume {
            font-size: 15px;
            color: #555;
            margin: 0 0 10px 0;
            text-align: left;
            line-height: 1.4;
        }
        .news-card-date {
            font-size: 13px;
            color: #999;
        }
        #no-news {
            text-align: center;
            color: #999;
            margin-top: 40px;
        }
        @media (max-width: 768px) {
            #news-list-container { padding: 20px 15px; }
            .news-card { flex-direction: column; }
            .news-card-img { width: 100%; height: 180px; }
            .news-card-body { padding: 15px; }
        }
    </style>
</head>
<body>
    <div id="news-list-container">
        <div class="HoriSepLine"></div>
        <h1>Toutes les actualités</h1>
        <div class="HoriSepLine"></div>
        <div id="newsList"></div>
    </div>
    <script type="module" src="assets/js/ui.js"></script>
    <script type="module" src="assets/js/news-list.js"></script>
</body>
</html>
