<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Événements – GN Cotentin</title>
    <meta name="description" content="Retrouvez tous les événements géocaching organisés par les Géocacheurs Normands du Cotentin : sorties, CITO, rencontres…">
    <meta property="og:title" content="Événements – GN Cotentin">
    <meta property="og:description" content="Les prochains événements géocaching dans le Cotentin.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="assets/css/Events.css">
</head>
<body>
    <div id="events-nav">
        <a href="accueil.html">Accueil</a>
        <span class="sep">›</span>
        <span>Événements</span>
    </div>

    <div id="events-container">
        <h1 id="events-page-title">Événements</h1>

        <div id="events-filters">
            <div id="filter-tabs">
                <button class="filter-tab active" data-filter="upcoming">À venir</button>
                <button class="filter-tab" data-filter="past">Passés</button>
                <button class="filter-tab" data-filter="all">Tous</button>
            </div>
            <div id="filter-dates">
                <span class="filter-date-label">Entre le</span>
                <input type="date" id="filter-from">
                <span class="filter-date-label">et le</span>
                <input type="date" id="filter-to">
                <button id="filter-apply">Filtrer</button>
                <button id="filter-reset" style="display:none">Réinitialiser</button>
            </div>
        </div>

        <div id="events-upcoming-section">
            <p class="events-section-title">À venir</p>
            <div id="events-upcoming-list"></div>
        </div>

        <div id="events-past-section">
            <p class="events-section-title past">Passés</p>
            <div id="events-past-list"></div>
        </div>

        <div id="events-range-section" style="display:none">
            <p class="events-section-title" id="events-range-title"></p>
            <div id="events-range-list"></div>
        </div>
    </div>

    <script type="module" src="assets/js/ui.js"></script>
    <script type="module" src="assets/js/events.js"></script>
</body>
</html>
