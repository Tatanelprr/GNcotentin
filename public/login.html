<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin</title>
    <link rel="stylesheet" href="assets/css/Login.css">
</head>
<body>
    <div id="LoginContainer">
        <div class="logo-container">
            <img src="assets/img/ui/GNLogo.jpg" alt="Logo GN">
        </div>
        <h2>Espace Admin</h2>
        <div class="error-msg" id="errorMsg" style="display:none">Identifiants incorrects !</div>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Identifiant" autocomplete="username" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mot de passe" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>
        <a href="accueil.html" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:4px"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Retour au site</a>
    </div>
    <script type="module" src="assets/js/login.js"></script>
</body>
</html>
